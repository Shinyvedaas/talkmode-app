<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — TalkMode</title>
<meta name="description" content="TalkMode turns a Mac mini or any Apple-silicon Mac into a real-time Korean voice assistant. Sub-second turn-taking, on-device, your terms." />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<style>
  :root {
    --teal: #3ebbae;
    --blue: #286bc6;
    --ink: #18202f;
    --muted: #5b6577;
    --line: #e6eaf0;
    --soft: #f6f8fb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    background: radial-gradient(900px 420px at 50% -120px, #e8f6f4 0%, #ffffff 70%);
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .not-found {
    width: 100%;
    max-width: 620px;
    text-align: center;
  }
  .logo {
    width: 96px;
    height: 96px;
    display: block;
    margin: 0 auto 24px;
    filter: drop-shadow(0 12px 28px rgba(40,107,198,0.28));
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 30px;
    margin-bottom: 18px;
    padding: 2px 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--soft);
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
  }
  h1 {
    font-size: 52px;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }
  p {
    max-width: 520px;
    margin: 16px auto 0;
    color: var(--muted);
    font-size: 20px;
  }
  .cta {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 32px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 13px 24px;
    border-radius: 11px;
    font-size: 15px;
    font-weight: 600;
  }
  .btn-primary {
    background: linear-gradient(180deg, var(--teal), var(--blue));
    color: #fff;
    box-shadow: 0 8px 20px rgba(40,107,198,0.30);
  }
  .btn-primary:hover { text-decoration: none; opacity: 0.93; }
  .btn-ghost {
    border: 1px solid var(--line);
    background: var(--soft);
    color: var(--ink);
  }
  @media (max-width: 760px) {
    h1 { font-size: 38px; }
    p { font-size: 17px; }
  }
</style>
</head>
<body>
  <main class="not-found">
    <img class="logo" src="/favicon.svg" alt="TalkMode icon" />
    <span class="eyebrow">404 Not Found</span>
    <h1>This page drifted off.</h1>
    <p>The page you are looking for does not exist.</p>
    <div class="cta">
      <a class="btn btn-primary" href="/">Back to home</a>
    </div>
  </main>
</body>
</html>
